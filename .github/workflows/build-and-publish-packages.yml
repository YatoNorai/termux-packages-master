name: Build and Publish Packages

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Packages to build (comma-separated, or "all" for bootstrap essentials)'
        required: true
        default: 'bash,coreutils,apt,dpkg'
  push:
    branches:
      - main
    paths:
      - 'packages/**'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-packages:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [aarch64, arm, x86_64, i686]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Determine packages to build
        id: pkgs
        run: |
          PACKAGES="${{ github.event.inputs.packages }}"
          if [ -z "$PACKAGES" ] || [ "$PACKAGES" = "all" ]; then
            PACKAGES="bash,coreutils,apt,dpkg,termux-tools,termux-keyring,curl,wget,tar,gzip,xz-utils,sed,grep,findutils,diffutils"
          fi
          echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
          echo "[*] Will build: $PACKAGES"

      - name: Pull Termux package builder image
        run: |
          docker pull ghcr.io/termux/package-builder:latest
          echo "[*] Image pulled"

      - name: Debug - find output path inside container
        run: |
          echo "[*] Checking where build-package.sh puts .deb files..."
          docker run --rm \
            -v "$(pwd):/home/builder/termux-packages" \
            ghcr.io/termux/package-builder:latest \
            bash -c "
              echo '=== grep OUTPUT path in build-package.sh ==='
              grep -n -i 'DEBS_DIR\|OUTPUT\|\.deb\|output' /home/builder/termux-packages/build-package.sh 2>/dev/null | head -40
              echo ''
              echo '=== grep in scripts/properties.sh ==='
              grep -n -i 'DEBS_DIR\|OUTPUT\|\.deb' /home/builder/termux-packages/scripts/properties.sh 2>/dev/null | head -20
              echo ''
              echo '=== grep in scripts/build-package.sh if exists ==='
              grep -n -i 'DEBS_DIR\|OUTPUT\|\.deb' /home/builder/termux-packages/scripts/build-package.sh 2>/dev/null | head -20 || true
            "

      - name: Build packages using Termux Docker builder
        run: |
          PACKAGES="${{ steps.pkgs.outputs.packages }}"
          ARCH="${{ matrix.arch }}"

          # Create output dir with full permissions
          mkdir -p "$(pwd)/output-debs"
          chmod 777 "$(pwd)/output-debs"

          echo "[*] Building arch=$ARCH packages=$PACKAGES"

          IFS=',' read -ra PKG_ARRAY <<< "$PACKAGES"
          for pkg in "${PKG_ARRAY[@]}"; do
            pkg=$(echo "$pkg" | xargs)
            echo ""
            echo "========================================"
            echo "[*] Building: $pkg for $ARCH"
            echo "========================================"

            # Run with full output visible - no suppression
            docker run --rm \
              -v "$(pwd):/home/builder/termux-packages" \
              -v "$(pwd)/output-debs:/tmp/debs-output" \
              -e TERMUX_ARCH="$ARCH" \
              -e TERMUX_MAKE_PROCESSES="$(nproc)" \
              ghcr.io/termux/package-builder:latest \
              bash -c "
                set -x
                cd /home/builder/termux-packages

                echo '[container] arch=$ARCH pkg=$pkg'
                echo '[container] Running build...'

                # Try with -o flag first (explicit output dir), fallback to default
                if ./build-package.sh --help 2>&1 | grep -q '\-o'; then
                  ./build-package.sh -a $ARCH -I -o /tmp/debs-output '$pkg'
                else
                  ./build-package.sh -a $ARCH -I '$pkg'
                fi

                BUILD_EXIT=\$?
                echo '[container] build-package.sh exit code:' \$BUILD_EXIT

                echo '[container] Searching for .deb files everywhere...'
                find / -name '*.deb' -type f 2>/dev/null | grep -v proc

                echo '[container] Trying to copy to /tmp/debs-output...'
                find / -name '*.deb' -type f 2>/dev/null | grep -v proc | while read f; do
                  echo \"[container] Copying \$f\"
                  cp \"\$f\" /tmp/debs-output/ 2>/dev/null || true
                done

                ls -lh /tmp/debs-output/ || echo '[container] output dir empty'
                exit \$BUILD_EXIT
              " \
            && echo "[*] SUCCESS: $pkg" \
            || echo "[!] FAILED: $pkg (see output above)"

            echo ""
            echo "[*] Host output-debs after $pkg:"
            ls -lh output-debs/ || echo "(empty)"
          done

      - name: Collect all .deb files
        run: |
          mkdir -p debs-${{ matrix.arch }}

          # output-debs is the primary target
          find output-debs -name "*.deb" -type f 2>/dev/null \
            -exec cp -v {} debs-${{ matrix.arch }}/ \; || true

          # Fallback: search entire workspace
          find . -name "*.deb" -type f \
            ! -path "./debs-*" \
            ! -path "./output-debs/*" \
            -exec cp -v {} debs-${{ matrix.arch }}/ \; || true

          echo ""
          echo "[*] Final collected packages for ${{ matrix.arch }}:"
          ls -lh debs-${{ matrix.arch }}/

          DEB_COUNT=$(find debs-${{ matrix.arch }} -name "*.deb" | wc -l)
          echo "[*] Total: $DEB_COUNT .deb files"

          if [ "$DEB_COUNT" -eq 0 ]; then
            echo "[!] ERROR: No .deb files collected for ${{ matrix.arch }}"
            echo "[!] Review the 'Build packages' step logs above for the real error."
            exit 1
          fi

      - name: Upload packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.arch }}
          path: debs-${{ matrix.arch }}/
          if-no-files-found: error
          retention-days: 30

  create-apt-repository:
    needs: build-packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-packages
          pattern: packages-*
          merge-multiple: false

      - name: Verify downloaded packages
        run: |
          echo "[*] Downloaded artifacts:"
          find all-packages -type f | sort

          DEB_COUNT=$(find all-packages -name "*.deb" | wc -l)
          echo "[*] Total .deb files: $DEB_COUNT"

          if [ "$DEB_COUNT" -eq 0 ]; then
            echo "[!] ERROR: No .deb files in artifacts!"
            exit 1
          fi

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg dpkg-dev

      - name: Create GPG signing key
        run: |
          if ! gpg --list-keys packages@fl-ide.com > /dev/null 2>&1; then
            cat > /tmp/gpg-batch <<EOF
          %echo Generating FL_IDE signing key
          Key-Type: RSA
          Key-Length: 4096
          Subkey-Type: RSA
          Subkey-Length: 4096
          Name-Real: FL_IDE Package Maintainer
          Name-Email: packages@fl-ide.com
          Expire-Date: 0
          %no-protection
          %commit
          %echo done
          EOF
            gpg --batch --generate-key /tmp/gpg-batch
          fi
          gpg --armor --export packages@fl-ide.com > fl-ide-packages.gpg
          echo "[*] GPG key ready"

      - name: Build APT repository
        run: |
          mkdir -p apt-repo/pool/main
          mkdir -p apt-repo/dists/stable/main

          find all-packages -name "*.deb" -type f | while read deb; do
            echo "[*] Adding: $(basename "$deb")"
            cp "$deb" apt-repo/pool/main/
          done

          cd apt-repo
          for arch in aarch64 arm x86_64 i686; do
            echo "[*] Generating Packages for $arch..."
            mkdir -p dists/stable/main/binary-$arch

            dpkg-scanpackages --arch $arch pool/main > dists/stable/main/binary-$arch/Packages 2>/dev/null \
              || dpkg-scanpackages pool/main > dists/stable/main/binary-$arch/Packages

            gzip -k dists/stable/main/binary-$arch/Packages
            xz   -k dists/stable/main/binary-$arch/Packages

            echo "[*]   $arch: $(grep -c '^Package:' dists/stable/main/binary-$arch/Packages || echo 0) packages"
          done

          # Release file
          cd dists/stable
          cat > Release <<EOF
          Origin: FL_IDE Packages
          Label: FL_IDE
          Suite: stable
          Codename: stable
          Architectures: aarch64 arm x86_64 i686
          Components: main
          Description: FL_IDE repository for com.yato.fl_ide
          Date: $(date -Ru)
          EOF

          echo "MD5Sum:" >> Release
          find main -type f | sort | while read f; do
            printf " %s %8d %s\n" "$(md5sum "$f" | cut -d' ' -f1)" "$(stat -c%s "$f")" "$f" >> Release
          done
          echo "SHA256:" >> Release
          find main -type f | sort | while read f; do
            printf " %s %8d %s\n" "$(sha256sum "$f" | cut -d' ' -f1)" "$(stat -c%s "$f")" "$f" >> Release
          done

          echo "[*] Release file created"

      - name: Copy GPG key and create index page
        run: |
          cp fl-ide-packages.gpg apt-repo/fl-ide-packages.gpg

          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="$(echo '${{ github.repository }}' | cut -d'/' -f2)"

          cat > apt-repo/index.html <<EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <title>FL_IDE Packages Repository</title>
            <style>
              body { font-family: sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
              code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; }
              pre  { background: #f4f4f4; padding: 15px; border-radius: 5px; overflow-x: auto; }
            </style>
          </head>
          <body>
            <h1>🎯 FL_IDE Packages Repository</h1>
            <p><strong>URL:</strong>
              <code>https://${REPO_OWNER}.github.io/${REPO_NAME}/apt-repo</code>
            </p>
            <h2>Setup</h2>
            <pre>echo "deb https://${REPO_OWNER}.github.io/${REPO_NAME}/apt-repo stable main" \\
            > \$PREFIX/etc/apt/sources.list.d/fl-ide.list

          curl -fsSL https://${REPO_OWNER}.github.io/${REPO_NAME}/apt-repo/fl-ide-packages.gpg \\
            | apt-key add -

          apt update</pre>
            <p>Built: $(date -u '+%Y-%m-%d %H:%M UTC')</p>
          </body>
          </html>
          EOF

      - name: Upload repository artifact
        uses: actions/upload-artifact@v4
        with:
          name: apt-repository
          path: apt-repo/
          retention-days: 90

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apt-repo
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Update APT repository'

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_TAG="packages-$(date '+%Y.%m.%d-%H%M')"

          gh release create "$RELEASE_TAG" \
            --title "FL_IDE Packages - $(date '+%Y-%m-%d %H:%M')" \
            --notes "Built for com.yato.fl_ide — aarch64, arm, x86_64, i686" \
            || echo "[!] Release tag already exists, skipping create"

          find apt-repo/pool/main -name "*.deb" \
            -exec gh release upload "$RELEASE_TAG" {} \; || true

          echo "[*] Done: $RELEASE_TAG"
name: Build and Publish Packages

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Packages to build (comma-separated, or "all" for bootstrap essentials)'
        required: true
        default: 'bash,coreutils,apt,dpkg'
  push:
    branches:
      - main
    paths:
      - 'packages/**'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-packages:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [aarch64, arm, x86_64, i686]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Inspect repository structure
        run: |
          echo "=== Root files ==="
          ls -la
          echo ""
          echo "=== scripts/ ==="
          ls -la scripts/ 2>/dev/null || echo "(no scripts/ dir)"
          echo ""
          echo "=== packages/ (first 20) ==="
          ls packages/ 2>/dev/null | head -20 || echo "(no packages/ dir)"
          echo ""
          echo "=== build-package.sh exists? ==="
          [ -f build-package.sh ] && echo "YES" || echo "NO - build-package.sh not found!"
          echo ""
          echo "=== Dockerfile or docker/ ==="
          find . -name "Dockerfile" -o -name "*.dockerfile" 2>/dev/null | head -10

      - name: Determine packages to build
        id: pkgs
        run: |
          PACKAGES="${{ github.event.inputs.packages }}"
          if [ -z "$PACKAGES" ] || [ "$PACKAGES" = "all" ]; then
            PACKAGES="bash,coreutils,apt,dpkg,termux-tools,termux-keyring,curl,wget,tar,gzip,xz-utils,sed,grep,findutils,diffutils"
          fi
          echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
          echo "[*] Will build: $PACKAGES"

      - name: Pull Termux package builder image
        run: |
          echo "[*] Pulling builder image..."
          docker pull ghcr.io/termux/package-builder:latest
          echo "[*] Image pulled successfully"
          docker inspect ghcr.io/termux/package-builder:latest | grep -E '"WorkingDir"|"Entrypoint"|"Cmd"'

      - name: Test Docker mount and workspace
        run: |
          echo "[*] Testing container access to workspace..."
          docker run --rm \
            -v "$(pwd):/home/builder/termux-packages" \
            ghcr.io/termux/package-builder:latest \
            bash -c "
              echo '=== Container user ==='
              whoami
              echo ''
              echo '=== Workspace contents ==='
              ls -la /home/builder/termux-packages/ | head -20
              echo ''
              echo '=== build-package.sh ==='
              ls -la /home/builder/termux-packages/build-package.sh || echo 'NOT FOUND'
              echo ''
              echo '=== packages/ dir ==='
              ls /home/builder/termux-packages/packages/ | head -10 || echo 'NOT FOUND'
            "

      - name: Build packages using Termux Docker builder
        run: |
          PACKAGES="${{ steps.pkgs.outputs.packages }}"
          ARCH="${{ matrix.arch }}"

          mkdir -p "$(pwd)/output-debs"
          chmod 777 "$(pwd)/output-debs"

          echo "[*] Building for arch: $ARCH"
          echo "[*] Packages: $PACKAGES"
          echo "[*] Output dir: $(pwd)/output-debs"

          IFS=',' read -ra PKG_ARRAY <<< "$PACKAGES"
          BUILT=0
          FAILED=0

          for pkg in "${PKG_ARRAY[@]}"; do
            pkg=$(echo "$pkg" | xargs)
            echo ""
            echo "========================================"
            echo "[*] Building: $pkg for $ARCH"
            echo "========================================"

            # Run build inside container - NO silent failure
            docker run --rm \
              -v "$(pwd):/home/builder/termux-packages" \
              -v "$(pwd)/output-debs:/home/builder/termux-packages/output" \
              -e TERMUX_ARCH="$ARCH" \
              ghcr.io/termux/package-builder:latest \
              bash -c "
                set -e
                cd /home/builder/termux-packages
                echo '[container] Starting build of $pkg for $ARCH'
                ./build-package.sh -a $ARCH -I '$pkg' 2>&1
                echo '[container] Build finished'
              " \
            && {
              echo "[*] SUCCESS: $pkg"
              BUILT=$((BUILT + 1))
            } || {
              echo "[!] FAILED: $pkg"
              FAILED=$((FAILED + 1))
            }
          done

          echo ""
          echo "=== Build Summary ==="
          echo "Built:  $BUILT"
          echo "Failed: $FAILED"
          echo ""
          echo "[*] Output directory contents:"
          ls -lh "$(pwd)/output-debs/" || echo "(empty)"
          echo ""
          echo "[*] All .deb files found anywhere:"
          find . -name "*.deb" -type f | sort

      - name: Collect built packages
        run: |
          mkdir -p debs-${{ matrix.arch }}

          # Collect from output-debs first
          if [ -d "output-debs" ] && [ -n "$(ls output-debs/*.deb 2>/dev/null)" ]; then
            cp -v output-debs/*.deb debs-${{ matrix.arch }}/
          fi

          # Also search anywhere else in workspace
          find . -name "*.deb" -type f \
            ! -path "./debs-*" \
            ! -path "./output-debs/*" \
            -exec cp -v {} debs-${{ matrix.arch }}/ \;

          echo ""
          echo "[*] Final packages for ${{ matrix.arch }}:"
          ls -lh debs-${{ matrix.arch }}/ || echo "(empty)"

          DEB_COUNT=$(find debs-${{ matrix.arch }} -name "*.deb" | wc -l)
          echo "[*] Total: $DEB_COUNT .deb files"

          if [ "$DEB_COUNT" -eq 0 ]; then
            echo ""
            echo "========================================"
            echo "[!] ERROR: No .deb files were built!"
            echo ""
            echo "Possible causes:"
            echo "  1. Package names don't exist in your fork's packages/ dir"
            echo "  2. build-package.sh failed inside Docker (check logs above)"
            echo "  3. Output path mismatch inside the container"
            echo ""
            echo "Available packages in this repo:"
            ls packages/ | head -30 || echo "(cannot list packages/)"
            echo "========================================"
            exit 1
          fi

      - name: Upload packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.arch }}
          path: debs-${{ matrix.arch }}/
          if-no-files-found: error
          retention-days: 30

  create-apt-repository:
    needs: build-packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-packages
          pattern: packages-*
          merge-multiple: false

      - name: Verify downloaded packages
        run: |
          echo "[*] Downloaded artifacts:"
          find all-packages -type f | sort

          DEB_COUNT=$(find all-packages -name "*.deb" | wc -l)
          echo "[*] Total .deb files: $DEB_COUNT"

          if [ "$DEB_COUNT" -eq 0 ]; then
            echo "[!] ERROR: No .deb files in artifacts!"
            exit 1
          fi

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg dpkg-dev

      - name: Create GPG signing key
        run: |
          if ! gpg --list-keys packages@fl-ide.com > /dev/null 2>&1; then
            cat > /tmp/gpg-batch <<EOF
          %echo Generating FL_IDE signing key
          Key-Type: RSA
          Key-Length: 4096
          Subkey-Type: RSA
          Subkey-Length: 4096
          Name-Real: FL_IDE Package Maintainer
          Name-Email: packages@fl-ide.com
          Expire-Date: 0
          %no-protection
          %commit
          %echo done
          EOF
            gpg --batch --generate-key /tmp/gpg-batch
          fi
          gpg --armor --export packages@fl-ide.com > fl-ide-packages.gpg
          echo "[*] GPG key ready"

      - name: Build APT repository
        run: |
          mkdir -p apt-repo/pool/main
          mkdir -p apt-repo/dists/stable/main

          find all-packages -name "*.deb" -type f | while read deb; do
            echo "[*] Adding: $(basename $deb)"
            cp "$deb" apt-repo/pool/main/
          done

          # Generate per-arch Packages files
          cd apt-repo
          for arch in aarch64 arm x86_64 i686; do
            mkdir -p dists/stable/main/binary-$arch
            dpkg-scanpackages --arch $arch pool/main > dists/stable/main/binary-$arch/Packages 2>/dev/null \
              || dpkg-scanpackages pool/main > dists/stable/main/binary-$arch/Packages
            gzip -k dists/stable/main/binary-$arch/Packages
            xz   -k dists/stable/main/binary-$arch/Packages
            echo "[*] $arch: $(grep -c '^Package:' dists/stable/main/binary-$arch/Packages || echo 0) packages"
          done

          # Release file
          cd dists/stable
          cat > Release <<EOF
          Origin: FL_IDE Packages
          Label: FL_IDE
          Suite: stable
          Codename: stable
          Architectures: aarch64 arm x86_64 i686
          Components: main
          Description: FL_IDE repository for com.yato.fl_ide
          Date: $(date -Ru)
          EOF

          echo "MD5Sum:" >> Release
          find main -type f | sort | while read f; do
            printf " %s %8d %s\n" "$(md5sum "$f" | cut -d' ' -f1)" "$(stat -c%s "$f")" "$f" >> Release
          done
          echo "SHA256:" >> Release
          find main -type f | sort | while read f; do
            printf " %s %8d %s\n" "$(sha256sum "$f" | cut -d' ' -f1)" "$(stat -c%s "$f")" "$f" >> Release
          done

      - name: Copy GPG key and create index
        run: |
          cp fl-ide-packages.gpg apt-repo/fl-ide-packages.gpg
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="$(echo '${{ github.repository }}' | cut -d'/' -f2)"
          cat > apt-repo/index.html <<EOF
          <!DOCTYPE html><html><head><meta charset="UTF-8"><title>FL_IDE Repo</title></head>
          <body>
          <h1>FL_IDE Packages Repository</h1>
          <p><code>https://${REPO_OWNER}.github.io/${REPO_NAME}/apt-repo</code></p>
          <pre>echo "deb https://${REPO_OWNER}.github.io/${REPO_NAME}/apt-repo stable main" > \$PREFIX/etc/apt/sources.list.d/fl-ide.list
          curl -fsSL https://${REPO_OWNER}.github.io/${REPO_NAME}/apt-repo/fl-ide-packages.gpg | apt-key add -
          apt update</pre>
          <p>Built: $(date -u '+%Y-%m-%d %H:%M UTC')</p>
          </body></html>
          EOF

      - name: Upload repository artifact
        uses: actions/upload-artifact@v4
        with:
          name: apt-repository
          path: apt-repo/
          retention-days: 90

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apt-repo
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Update APT repository'

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_TAG="packages-$(date '+%Y.%m.%d-%H%M')"
          gh release create "$RELEASE_TAG" \
            --title "FL_IDE Packages - $(date '+%Y-%m-%d %H:%M')" \
            --notes "Built for com.yato.fl_ide — aarch64, arm, x86_64, i686" \
            || echo "[!] Release tag exists, skipping"
          find apt-repo/pool/main -name "*.deb" -exec gh release upload "$RELEASE_TAG" {} \; || true
          echo "[*] Done: $RELEASE_TAG"